<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IU — Create account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1/dist/iife/sdk.min.js"></script>
</head>
<body>
  <div class="noise"></div>
  <div class="auth-page">
    <div class="auth-card">
      <a href="../index.html" class="auth-logo">IU</a>

      <h1 class="auth-title">Create account</h1>
      <p class="auth-sub">You must be 18 or older. We verify your age before access.</p>

      <div class="age-notice">
        <span class="age-notice-icon">&#9432;</span>
        <span>IU is strictly for adults (18+). By registering you confirm you are of legal age in your jurisdiction.</span>
      </div>

      <form class="auth-form" id="registerForm" style="margin-top:24px;">
        <div class="form-group">
          <label class="form-label" for="name">Display name</label>
          <input class="form-input" type="text" id="name" placeholder="How others will know you" autocomplete="name" required/>
          <span class="form-error" id="nameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="dob">Date of birth</label>
          <input class="form-input" type="date" id="dob" required/>
          <span class="form-error" id="dobError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="8+ characters" autocomplete="new-password" required minlength="8"/>
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <input class="form-input" type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password" required/>
          <span class="form-error" id="confirmError"></span>
        </div>

        <button type="submit" class="btn-primary submit-btn" id="submitBtn">
          <span class="btn-text">Create account</span>
          <span class="btn-spinner"><span class="spinner"></span></span>
        </button>
      </form>

      <p class="auth-footer-link">
        Already have an account? <a href="login.html">Sign in</a>
      </p>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="../js/appwrite.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script>
    // Redirect if already logged in
    checkLoggedIn().then(u => { if (u) window.location.href = 'queue.html'; });

    // Set max date to 18 years ago
    const dobInput = document.getElementById('dob');
    const maxDate = new Date();
    maxDate.setFullYear(maxDate.getFullYear() - 18);
    dobInput.max = maxDate.toISOString().split('T')[0];

    const form = document.getElementById('registerForm');
    const btn  = document.getElementById('submitBtn');

    function setError(fieldId, msg) {
      const el = document.getElementById(fieldId + 'Error');
      if (el) el.textContent = msg;
      const input = document.getElementById(fieldId);
      if (input) input.classList.toggle('error', !!msg);
    }
    function clearErrors() {
      ['name','email','dob','password','confirm'].forEach(f => setError(f, ''));
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearErrors();

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const dob      = document.getElementById('dob').value;
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      let valid = true;
      if (!name)              { setError('name', 'Name is required.'); valid = false; }
      if (!email)             { setError('email', 'Email is required.'); valid = false; }
      if (!dob)               { setError('dob', 'Date of birth is required.'); valid = false; }
      if (password.length < 8){ setError('password', 'Password must be at least 8 characters.'); valid = false; }
      if (password !== confirm){ setError('confirm', 'Passwords do not match.'); valid = false; }
      if (!valid) return;

      btn.classList.add('loading');
      btn.disabled = true;

      try {
        await register({ email, password, name, dateOfBirth: dob });
        showToast('Account created! Welcome to IU.', 'success');
        setTimeout(() => window.location.href = 'queue.html', 1000);
      } catch (err) {
        const msg = err.message || 'Registration failed. Please try again.';
        if (msg.toLowerCase().includes('age') || msg.toLowerCase().includes('18')) {
          setError('dob', msg);
        } else if (msg.toLowerCase().includes('email')) {
          setError('email', 'This email is already registered.');
        } else {
          showToast(msg, 'error');
        }
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
