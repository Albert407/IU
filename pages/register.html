<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IU — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      position: relative;
    }
    .auth-page::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at 50% 40%, rgba(0,220,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .auth-card {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease forwards;
    }
    .auth-header {
      background: var(--bg2);
      border: 1px solid var(--border2);
      border-bottom: none;
      padding: 28px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .auth-logo {
      font-family: var(--font-hd);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.05em;
      text-decoration: none;
    }
    .auth-logo .c { color: var(--cyan); }
    .auth-body {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 40px;
      position: relative;
    }
    .auth-body::before, .auth-body::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--cyan);
      border-style: solid;
    }
    .auth-body::before { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }
    .auth-body::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .auth-title {
      font-family: var(--font-hd);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--white);
      margin-bottom: 4px;
    }
    .auth-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }
    .auth-form { display: flex; flex-direction: column; gap: 20px; }

    .age-notice {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: rgba(0,220,255,0.05);
      border: 1px solid rgba(0,220,255,0.2);
      border-left: 3px solid var(--cyan);
      padding: 14px 16px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      font-family: var(--font-mono);
    }
    .age-notice .icon { color: var(--cyan); flex-shrink: 0; }

    .submit-btn {
      width: 100%;
      padding: 16px;
      font-size: 14px;
      position: relative;
      clip-path: none;
    }
    .submit-btn .btn-text { transition: opacity 0.2s; }
    .submit-btn .btn-spin { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none; }
    .submit-btn.loading .btn-text { opacity: 0; }
    .submit-btn.loading .btn-spin { display: block; }

    .auth-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .auth-footer a { color: var(--cyan); text-decoration: none; font-weight: 700; }
    .auth-footer a:hover { text-shadow: 0 0 8px var(--cyan); }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.1/dist/iife/sdk.min.js"></script>
</head>
<body>
  <div class="grid-bg"></div>

  <nav class="nav">
    <a href="../index.html" class="nav-logo">
      <span class="part1">IU</span><span class="part2">CONNECT</span>
    </a>
    <div class="nav-links">
      <a href="login.html" class="nav-link">Sign In</a>
    </div>
    <a href="register.html" class="nav-cta">Register</a>
  </nav>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <a href="../index.html" class="auth-logo">IU<span class="c">CONNECT</span></a>
        <span class="badge badge-cyan">18+ Only</span>
      </div>
      <div class="auth-body">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-sub">Join the blind connection platform. Strictly 18+.</p>

        <div class="age-notice">
          <span class="icon">&#9432;</span>
          <span>You must be 18 or older. Age is verified at signup. Providing a false date of birth will result in a permanent ban.</span>
        </div>

        <form class="auth-form" id="registerForm" style="margin-top:24px;">
          <div class="form-group">
            <label class="form-label">Display Name</label>
            <input class="form-input" type="text" id="name" placeholder="How others will know you" required/>
            <span class="form-error" id="nameError"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="email" placeholder="your@email.com" required/>
            <span class="form-error" id="emailError"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Date of Birth</label>
            <input class="form-input" type="date" id="dob" required/>
            <span class="form-error" id="dobError"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="password" placeholder="Min. 8 characters" required minlength="8"/>
            <span class="form-error" id="passwordError"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm Password</label>
            <input class="form-input" type="password" id="confirm" placeholder="Repeat password" required/>
            <span class="form-error" id="confirmError"></span>
          </div>
          <button type="submit" class="btn-cyan submit-btn" id="submitBtn">
            <span class="btn-text">Create Account</span>
            <span class="btn-spin"><span class="spinner"></span></span>
          </button>
        </form>

        <p class="auth-footer">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <div class="toast-container"></div>

  <script src="../js/appwrite.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script>
    checkLoggedIn().then(u => { if (u) window.location.href = 'queue.html'; });

    // Max DOB = 18 years ago
    const dobInput = document.getElementById('dob');
    const maxDate = new Date();
    maxDate.setFullYear(maxDate.getFullYear() - 18);
    dobInput.max = maxDate.toISOString().split('T')[0];

    const form = document.getElementById('registerForm');
    const btn  = document.getElementById('submitBtn');

    function setError(f, msg) {
      document.getElementById(f+'Error').textContent = msg;
      document.getElementById(f).classList.toggle('error', !!msg);
    }
    function clearErrors() {
      ['name','email','dob','password','confirm'].forEach(f => setError(f,''));
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      clearErrors();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const dob = document.getElementById('dob').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      let valid = true;
      if (!name)               { setError('name','Name required.'); valid=false; }
      if (!email)              { setError('email','Email required.'); valid=false; }
      if (!dob)                { setError('dob','Date of birth required.'); valid=false; }
      if (password.length < 8) { setError('password','Min. 8 characters.'); valid=false; }
      if (password !== confirm) { setError('confirm','Passwords do not match.'); valid=false; }
      if (!valid) return;

      btn.classList.add('loading'); btn.disabled = true;
      try {
        await register({ email, password, name, dateOfBirth: dob });
        showToast('Account created. Welcome to IU.', 'success');
        setTimeout(() => window.location.href = 'queue.html', 1000);
      } catch(err) {
        const msg = err.message || 'Registration failed.';
        if (msg.includes('18') || msg.includes('age')) setError('dob', msg);
        else if (msg.includes('email') || msg.includes('already')) setError('email','Email already registered.');
        else showToast(msg, 'error');
        btn.classList.remove('loading'); btn.disabled=false;
      }
    });
  </script>
</body>
</html>
