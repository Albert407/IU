<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IU — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <style>
    .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;padding:80px 20px;position:relative; }
    .auth-page::before { content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(0,220,255,0.06) 0%,transparent 60%);pointer-events:none; }
    .auth-card { width:100%;max-width:440px;position:relative;z-index:1;animation:fadeUp 0.5s ease forwards; }
    .auth-head { background:var(--bg2);border:1px solid var(--border2);border-bottom:none;padding:22px 40px;display:flex;align-items:center;justify-content:space-between; }
    .auth-logo { font-family:var(--font-hd);font-size:18px;font-weight:900;letter-spacing:0.06em;text-decoration:none; }
    .auth-logo .c { color:var(--cyan); }
    .auth-body { background:var(--bg2);border:1px solid var(--border);padding:40px;position:relative; }
    .auth-body::before,.auth-body::after { content:'';position:absolute;width:14px;height:14px;border-color:var(--cyan);border-style:solid; }
    .auth-body::before { bottom:-1px;left:-1px;border-width:0 0 2px 2px; }
    .auth-body::after  { bottom:-1px;right:-1px;border-width:0 2px 2px 0; }
    .auth-title { font-family:var(--font-hd);font-size:20px;font-weight:900;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:4px; }
    .auth-sub { font-size:13px;color:var(--muted);margin-bottom:28px; }
    .auth-form { display:flex;flex-direction:column;gap:18px; }
    .submit-btn { width:100%;padding:15px;font-size:13px;position:relative;clip-path:none; }
    .submit-btn .txt { transition:opacity 0.2s; }
    .submit-btn .spin { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none; }
    .submit-btn.loading .txt { opacity:0; }
    .submit-btn.loading .spin { display:block; }
    .auth-foot { text-align:center;margin-top:20px;font-size:13px;color:var(--muted);font-family:var(--font-mono); }
    .auth-foot a { color:var(--cyan);text-decoration:none; }
    .auth-foot a:hover { text-shadow:0 0 8px var(--cyan); }

    /* Demo hint */
    .demo-hint {
      background:rgba(255,0,119,0.06);border:1px solid rgba(255,0,119,0.2);border-left:3px solid var(--magenta);
      padding:12px 16px;font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:20px;
    }
    .demo-hint strong { color:var(--magenta); }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <nav class="nav">
    <a href="../index.html" class="nav-logo">IU<span class="c">CONNECT</span></a>
    <div class="nav-links"><a href="register.html" class="nav-link">Register</a></div>
    <a href="login.html" class="nav-cta">Sign In</a>
  </nav>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-head">
        <a href="../index.html" class="auth-logo">IU<span class="c">CONNECT</span></a>
        <span class="badge badge-white">18+ Platform</span>
      </div>
      <div class="auth-body">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Sign in to start a new session.</p>

        <div class="demo-hint">
          <strong>Testing?</strong> Open two browser tabs, register two accounts, then sign into each. Start a session in both — they will match each other via BroadcastChannel + WebRTC.
        </div>

        <form class="auth-form" id="form">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="email" placeholder="your@email.com" required autocomplete="email"/>
            <span class="form-error" id="emailErr"></span>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input class="form-input" type="password" id="pw" placeholder="Your password" required autocomplete="current-password"/>
            <span class="form-error" id="pwErr"></span>
          </div>
          <button type="submit" class="btn-cyan submit-btn" id="btn">
            <span class="txt">Sign In</span>
            <span class="spin"><span class="spinner"></span></span>
          </button>
        </form>
        <p class="auth-foot">No account? <a href="register.html">Register here</a></p>
      </div>
    </div>
  </div>
  <div class="toast-container"></div>
  <script src="../js/iu.js"></script>
  <script>
    if (IU.getCurrentUser()) window.location.href = 'queue.html';
    const btn = document.getElementById('btn');
    document.getElementById('form').addEventListener('submit', e => {
      e.preventDefault();
      document.getElementById('emailErr').textContent = '';
      const email = document.getElementById('email').value.trim();
      const pw = document.getElementById('pw').value;
      btn.classList.add('loading'); btn.disabled = true;
      try {
        IU.login({ email, password: pw });
        IU.showToast('Signed in. Finding your match...', 'success');
        setTimeout(() => window.location.href = 'queue.html', 800);
      } catch(err) {
        const m = err.message || '';
        if (m.includes('suspend')) IU.showToast(m, 'error');
        else { document.getElementById('emailErr').textContent = m || 'Invalid credentials.'; document.getElementById('email').classList.add('error'); }
        btn.classList.remove('loading'); btn.disabled = false;
      }
    });
  </script>
</body>
</html>
